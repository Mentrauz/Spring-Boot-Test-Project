spring.application.name=troubleshoot-chatbot
server.port=8080

# H2 Database Configuration
spring.datasource.url=jdbc:h2:mem:chatbot
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# H2 Console (for development)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Logging
logging.level.com.troubleshoot.chatbot=DEBUG

# Gemini AI Configuration
gemini.api.key=AIzaSyCfxhu0AA4yKjxktM_RGu4KyDrLGpbSJYM
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent
gemini.model=gemini-3-flash-preview