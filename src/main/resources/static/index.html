<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Troubleshooting Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 24px;
      background: #1a1d27;
      border-bottom: 1px solid #2d3148;
      flex-shrink: 0;
    }

    .header-icon {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .header-text h1 { font-size: 16px; font-weight: 600; color: #f1f5f9; }
    .header-text p  { font-size: 12px; color: #64748b; margin-top: 1px; }

    .status-dot {
      width: 8px; height: 8px;
      background: #22c55e;
      border-radius: 50%;
      margin-left: auto;
      box-shadow: 0 0 6px #22c55e;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Chat area ── */
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-track { background: transparent; }
    #chat::-webkit-scrollbar-thumb { background: #2d3148; border-radius: 4px; }

    /* ── Welcome banner ── */
    .welcome {
      text-align: center;
      padding: 40px 20px 20px;
      animation: fadeUp 0.5s ease;
    }

    .welcome .big-icon {
      font-size: 52px;
      margin-bottom: 16px;
      display: block;
    }

    .welcome h2 { font-size: 22px; font-weight: 700; color: #f1f5f9; }
    .welcome p  { font-size: 14px; color: #64748b; margin-top: 8px; max-width: 380px; margin-inline: auto; }

    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 20px;
    }

    .suggestion-btn {
      padding: 8px 16px;
      background: #1e2235;
      border: 1px solid #2d3148;
      border-radius: 20px;
      color: #94a3b8;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .suggestion-btn:hover {
      background: #252a40;
      border-color: #6366f1;
      color: #e2e8f0;
    }

    /* ── Messages ── */
    .message {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      max-width: 820px;
      width: 100%;
      margin-inline: auto;
      animation: fadeUp 0.3s ease;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .message.user { flex-direction: row-reverse; }

    /* wrapper div holding bubble + badge — must grow and shrink properly */
    .message-body {
      display: flex;
      flex-direction: column;
      flex: 1;
      min-width: 0;
      max-width: calc(100% - 50px);
    }

    .message.user  .message-body { align-items: flex-end; }
    .message.bot   .message-body { align-items: flex-start; }

    .avatar {
      width: 34px; height: 34px;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .message.user .avatar { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
    .message.bot  .avatar { background: #1e2235; border: 1px solid #2d3148; }

    .bubble {
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.65;
      max-width: 100%;
      word-break: break-word;
    }

    .message.user .bubble {
      background: linear-gradient(135deg, #6366f1, #7c3aed);
      color: #fff;
      border-bottom-right-radius: 4px;
      text-align: left;
    }

    .message.bot .bubble {
      background: #1a1d27;
      border: 1px solid #2d3148;
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
    }

    /* Markdown-like formatting inside bot bubbles */
    .bubble h3    { font-size: 14px; font-weight: 600; margin: 12px 0 6px; color: #f1f5f9; }
    .bubble h3:first-child { margin-top: 0; }
    .bubble strong { color: #c4b5fd; }
    .bubble em     { color: #94a3b8; }
    .bubble code   { background: #0f1117; padding: 2px 6px; border-radius: 4px; font-size: 12px; color: #a5f3fc; }
    .bubble ol, .bubble ul { padding-left: 20px; margin: 6px 0; }
    .bubble li     { margin: 4px 0; }
    .bubble p      { margin: 6px 0; }
    .bubble p:first-child { margin-top: 0; }
    .bubble p:last-child  { margin-bottom: 0; }

    /* Resolved badge */
    .resolved-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 10px;
      background: rgba(34,197,94,0.15);
      border: 1px solid rgba(34,197,94,0.3);
      border-radius: 20px;
      font-size: 11px;
      color: #22c55e;
      margin-top: 8px;
    }

    /* Typing indicator */
    .typing .bubble {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 14px 18px;
    }

    .dot {
      width: 7px; height: 7px;
      background: #6366f1;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }

    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.5; }
      30%            { transform: translateY(-6px); opacity: 1; }
    }

    /* ── Input bar ── */
    .input-bar {
      padding: 16px;
      background: #1a1d27;
      border-top: 1px solid #2d3148;
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 10px;
      max-width: 820px;
      margin-inline: auto;
      background: #0f1117;
      border: 1px solid #2d3148;
      border-radius: 14px;
      padding: 8px 8px 8px 16px;
      transition: border-color 0.2s;
    }

    .input-row:focus-within { border-color: #6366f1; }

    #userInput {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #e2e8f0;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      max-height: 120px;
      line-height: 1.5;
      padding: 4px 0;
    }

    #userInput::placeholder { color: #475569; }

    #sendBtn {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: opacity 0.2s, transform 0.1s;
      flex-shrink: 0;
      align-self: flex-end;
    }

    #sendBtn:hover   { opacity: 0.85; }
    #sendBtn:active  { transform: scale(0.92); }
    #sendBtn:disabled { opacity: 0.35; cursor: not-allowed; }

    .input-hint {
      text-align: center;
      font-size: 11px;
      color: #334155;
      margin-top: 8px;
    }

    /* New chat button */
    #newChatBtn {
      background: transparent;
      border: 1px solid #2d3148;
      border-radius: 8px;
      color: #64748b;
      font-size: 12px;
      padding: 6px 12px;
      cursor: pointer;
      transition: all 0.2s;
      margin-left: auto;
    }

    #newChatBtn:hover { border-color: #6366f1; color: #6366f1; }

    /* Responsive */
    @media (max-width: 600px) {
      header { padding: 12px 16px; }
      #chat   { padding: 16px 10px; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-icon">🤖</div>
  <div class="header-text">
    <h1>AI Troubleshooting Assistant</h1>
    <p>Powered by Gemini AI</p>
  </div>
  <div class="status-dot" title="Online"></div>
  <button id="newChatBtn" onclick="newChat()">＋ New Chat</button>
</header>

<div id="chat">
  <div class="welcome" id="welcome">
    <span class="big-icon">🛠️</span>
    <h2>How can I help you today?</h2>
    <p>Describe your technical issue and I'll walk you through a step-by-step solution.</p>
    <div class="suggestions">
      <button class="suggestion-btn" onclick="useSuggestion(this)">My internet is not working</button>
      <button class="suggestion-btn" onclick="useSuggestion(this)">App crashes on startup</button>
      <button class="suggestion-btn" onclick="useSuggestion(this)">Computer is running slow</button>
      <button class="suggestion-btn" onclick="useSuggestion(this)">No sound from speakers</button>
      <button class="suggestion-btn" onclick="useSuggestion(this)">Screen is flickering</button>
      <button class="suggestion-btn" onclick="useSuggestion(this)">Printer not detected</button>
    </div>
  </div>
</div>

<div class="input-bar">
  <div class="input-row">
    <textarea id="userInput" rows="1" placeholder="Describe your issue…" maxlength="2000"></textarea>
    <button id="sendBtn" onclick="sendMessage()" title="Send">
      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
  <div class="input-hint">Press <kbd style="background:#1e2235;padding:1px 5px;border-radius:4px;border:1px solid #2d3148">Enter</kbd> to send &nbsp;·&nbsp; <kbd style="background:#1e2235;padding:1px 5px;border-radius:4px;border:1px solid #2d3148">Shift+Enter</kbd> for new line</div>
</div>

<script>
  let sessionId = null;

  const chatEl   = document.getElementById('chat');
  const inputEl  = document.getElementById('userInput');
  const sendBtn  = document.getElementById('sendBtn');

  // Auto-resize textarea
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });

  // Enter to send, Shift+Enter for newline
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function useSuggestion(btn) {
    inputEl.value = btn.textContent;
    inputEl.dispatchEvent(new Event('input'));
    inputEl.focus();
    sendMessage();
  }

  function newChat() {
    sessionId = null;
    chatEl.innerHTML = '';
    chatEl.insertAdjacentHTML('afterbegin', document.querySelector('.welcome')?.outerHTML || '');
    // Re-render welcome if removed
    chatEl.innerHTML = `
      <div class="welcome" id="welcome">
        <span class="big-icon">🛠️</span>
        <h2>How can I help you today?</h2>
        <p>Describe your technical issue and I'll walk you through a step-by-step solution.</p>
        <div class="suggestions">
          <button class="suggestion-btn" onclick="useSuggestion(this)">My internet is not working</button>
          <button class="suggestion-btn" onclick="useSuggestion(this)">App crashes on startup</button>
          <button class="suggestion-btn" onclick="useSuggestion(this)">Computer is running slow</button>
          <button class="suggestion-btn" onclick="useSuggestion(this)">No sound from speakers</button>
          <button class="suggestion-btn" onclick="useSuggestion(this)">Screen is flickering</button>
          <button class="suggestion-btn" onclick="useSuggestion(this)">Printer not detected</button>
        </div>
      </div>`;
    inputEl.value = '';
    inputEl.style.height = 'auto';
  }

  function appendMessage(role, text, resolved) {
    // Hide welcome screen on first message
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    const isUser = role === 'user';
    const avatar = isUser ? '👤' : '🤖';

    const div = document.createElement('div');
    div.className = `message ${role}`;

    const bubbleContent = isUser
      ? escapeHtml(text)
      : renderMarkdown(text);

    const resolvedBadge = (!isUser && resolved)
      ? `<div class="resolved-badge">✅ Issue marked as resolved</div>`
      : '';

    div.innerHTML = `
      <div class="avatar">${avatar}</div>
      <div class="message-body">
        <div class="bubble">${bubbleContent}</div>
        ${resolvedBadge}
      </div>`;

    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
    return div;
  }

  function showTyping() {
    const div = document.createElement('div');
    div.className = 'message bot typing';
    div.id = 'typing-indicator';
    div.innerHTML = `
      <div class="avatar">🤖</div>
      <div class="message-body">
        <div class="bubble">
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
      </div>`;
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function hideTyping() {
    const el = document.getElementById('typing-indicator');
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    sendBtn.disabled = true;

    appendMessage('user', text);
    showTyping();

    try {
      const payload = { message: text };
      if (sessionId) payload.sessionId = sessionId;

      const res = await fetch('/api/chat/message', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (!res.ok) throw new Error(`Server error: ${res.status}`);

      const data = await res.json();
      sessionId = data.sessionId;

      hideTyping();
      appendMessage('bot', data.response, data.resolved);

    } catch (err) {
      hideTyping();
      appendMessage('bot', `⚠️ Sorry, I couldn't connect to the AI service. Please make sure the server is running.\n\n_Error: ${err.message}_`);
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // ── Helpers ──

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  function renderMarkdown(text) {
    return text
      // Bold
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      // Italic
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      // Inline code
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      // Headers (###)
      .replace(/^### (.+)$/gm, '<h3>$1</h3>')
      // Numbered list
      .replace(/^\d+\.\s+(.+)$/gm, '<li>$1</li>')
      // Bullet list
      .replace(/^[*\-]\s+(.+)$/gm, '<li>$1</li>')
      // Wrap consecutive <li> in <ol>
      .replace(/(<li>.*<\/li>)/gs, match =>
        match.includes('1.') ? `<ol>${match}</ol>` : `<ul>${match}</ul>`)
      // Paragraphs (double newlines)
      .replace(/\n{2,}/g, '</p><p>')
      // Single newlines
      .replace(/\n/g, '<br>')
      // Wrap in paragraph
      .replace(/^(.+)$/, '<p>$1</p>');
  }
</script>
</body>
</html>
